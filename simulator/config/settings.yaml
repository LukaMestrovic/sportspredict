# ---------------------------------------------------------------------------
# Baseline model parameters + run settings.
#
# These encode reasonable men's-international priors so the simulator runs
# end-to-end WITHOUT any live data download. Layer-1 fitting (rates/*) overwrites
# the `baseline_rates` and coefficient blocks from ingested data when available.
# Every number here is an assumption documented in README.md.
# ---------------------------------------------------------------------------

simulation:
  n_sims: 50000          # Monte-Carlo draws per match
  seed: 20260611
  cache_dir: data/processed/sim_cache

# ---------------------------------------------------------------------------
# sportspredict-hybrid ONLY: which Layer-1 rate model to use.
#   baseline -> the imported sportspredict RateModel (log-linear in Elo).
#   learned  -> the gray-box LearnedRateModel (GBM per stat, blended toward
#               baseline), used iff its artifact loads; otherwise it falls
    #               back to baseline automatically.
# Everything below this block is an unmodified copy of the baseline config.
# ---------------------------------------------------------------------------
rates:
  model: learned
  learned:
    artifact: data/processed/rate_model.joblib
    metadata: data/processed/rate_model.json
    team_ratings: data/processed/team_ratings.json
    blend_alpha: 0.5       # fallback global blend; per-stat alpha in metadata overrides
    # Guardrails so no single learned stat can override the sane baseline (see rates/learned.py,
    # rates/train.py). max_alpha caps every per-stat blend weight (the "always shrink toward
    # baseline" rule); max_ratio clamps the learned/baseline per-match-mean ratio to [1/R, R] so a
    # corrupt stat (e.g. the under-counted StatsBomb offsides) is treated as data error, not signal.
    max_alpha: 0.75
    max_ratio: 3.0
    # StatsBomb's explicit Offside rows under-count the event. Offsides is therefore learned only
    # from the 4k+ API-Football fixtures whose match totals pass the plausibility guard.
    learned_stats: [goals, shots_on_target, corners, fouls, offsides, yellows]
    stat_sources:
      offsides: [apifootball]

# ---------------------------------------------------------------------------
# sportspredict-hybrid ONLY: live input-anchoring.
#   Anchors the simulator's per-stat λ to sharp bookmaker totals (corners/cards/goals) so the EXOTIC
#   families the bot competes on become market-consistent in one shot. A strict no-op without live
#   odds (e.g. inside the offline gate), so the gate is unaffected; the edge is live-only by design.
#   `anchor_weight` shrinks each correction toward the model (0 = ignore, 1 = match the market mean):
#   deep goal markets are trusted more than thin 2-book corner/card lines.
# ---------------------------------------------------------------------------
adjust:
  enabled: true
  max_ratio: 2.0          # clamp any single λ multiplier to [1/2, 2] (defense in depth)
  anchor_weight:
    goals: 0.80
    corners: 0.60
    cards: 0.55

# Additive post-simulation models for question families that need event timing or player ownership.
# They never alter the learned team-rate path; unsupported inputs degrade to the frozen wheel.
postsim:
  enabled: true
  et_minutes: 30.0
  event_model: data/processed/event_timing.json
  evidence_history: data/processed/simulation_evidence.json
  # The LLM bridge runs beside the live bot on a ~4 GB/no-swap host. Keep its one-match report
  # comfortably below the 50k general default; explicit bridge requests are capped as well.
  report_n_sims: 8000
  report_max_n_sims: 10000
  # Validated by leave-one-tournament-out player backtesting; unseen players fall back to position.
  player_allocation: true
  player_shares: data/processed/player_shares.json

# Per-team, per-MATCH baseline expected counts at a neutral venue between evenly
# matched sides (Elo difference 0). Half splits below distribute these across 1H/2H.
baseline_rates:
  goals: 1.36
  shots_on_target: 4.4
  corners: 5.1
  fouls: 13.0
  offsides: 1.5
  yellows: 1.95
  reds_per_team: 0.062          # ~ P(team shown >=1 red) baseline
  # Match-level (not per-team) rare events:
  penalties_per_match: 0.27

# Fraction of each per-match count that occurs in the FIRST half (h1).
# Remainder occurs in the second half. From StatsBomb event timestamps.
half_share_h1:
  goals: 0.46
  shots_on_target: 0.48
  corners: 0.49
  fouls: 0.48
  offsides: 0.50
  yellows: 0.38                  # cards skew heavily to 2H (fatigue/tension)

# Log-linear response of rates to standardized strength supremacy
#   s = beta * (Elo_team - Elo_opp) / 100
# A positive coefficient means the STRONGER team gets more of that statistic.
# Goals/SoT/corners/offsides shift toward the dominant side; fouls slightly toward
# the underdog; cards/pens are driven mostly by referee + physicality (small here).
strength_coeffs:
  goals: 0.180
  shots_on_target: 0.110
  corners: 0.080
  offsides: 0.060
  fouls: -0.040
  yellows: -0.010

# Additive log-rate adjustments for match context.
context_effects:
  host_supremacy_bonus: 0.15     # added to s for a host nation playing at home
  knockout_yellow_mult: 1.10     # more cards in knockout matches
  knockout_red_mult: 1.10        # red cards have their own knob (was sharing the yellow one)
  knockout_foul_mult: 1.04
  # Closely-matched games are tenser -> mild card inflation when |s| is small.
  tight_game_yellow_mult_max: 1.08

# Overdispersion / correlation structure.
dispersion:
  # Shared multiplicative gamma frailties (mean 1). Variance controls overdispersion
  # AND the positive correlation they induce across markets.
  tempo_frailty_var: 0.06        # scales ALL event volume (both teams co-move)
  physicality_frailty_var: 0.10  # scales fouls/cards/reds/penalties together
  # Per-stat Negative-Binomial variance-to-mean ratio (>1 => overdispersed) applied
  # ON TOP of the frailty. 1.0 would be pure Poisson.
  nb_vmr:
    shots_on_target: 1.25
    corners: 1.30
    fouls: 1.20
    offsides: 1.35
    yellows: 1.15

# Goal model specifics.
goals_model:
  dixon_coles_rho: 0.08          # low-score correction (raises 0-0/1-1, lowers 1-0/0-1)
  et_fatigue: 0.90               # ET scoring rate = (30/90) * et_fatigue * regulation rate
  shootout_conversion: 0.75      # per-kick scoring probability in a shootout

# Player goal/assist attribution priors.
players:
  prob_goal_assisted: 0.70        # fraction of goals that have an assist
  penalty_taker_goal_mult: 1.6    # designated penalty takers score more
  # Exposure weight for bench players in a confirmed lineup. Only ~5 of ~12 bench
  # players come on, for ~25 minutes each (~0.12 FTE average); 0.20 leaves headroom for
  # planned-impact subs. 0.35 over-weighted the bench and diluted starters' goal shares.
  sub_start_prob: 0.20
  # Per-90 attacking-weight priors by position, used when club rates are unknown and to
  # synthesize teammates when the full lineup is not supplied.
  default_goal_rate:
    FW: 0.40
    MF: 0.12
    DF: 0.05
    GK: 0.0
  default_assist_rate:
    FW: 0.20
    MF: 0.18
    DF: 0.07
    GK: 0.0
  # Canonical outfield shape used to synthesize the rest of a team when only the target
  # player is known.
  canonical_formation:
    GK: 1
    DF: 4
    MF: 4
    FW: 2

# Crude per-player count-prop means (Poisson) by position, used for player statistical
# markets (e.g. "player X to have 1+ shots on target") when no per-player rate is available.
player_stat_lambda:
  shots_on_target:
    FW: 1.0
    MF: 0.55
    DF: 0.22
    GK: 0.02

# Market layer.
markets:
  devig_method: shin             # one of: proportional | shin | power
  # Logit-space shrink weight toward the de-vigged market price, by market family.
  # 0 => pure model (concentrate edge on exotics); ~0.8 => trust the sharp market.
  shrink_weight:
    match_result: 0.80
    total_goals: 0.75
    btts: 0.75
    team_vs_team_more: 0.0
    count_threshold: 0.0
    half_conditional: 0.0
    player_score_or_assist: 0.0
    player_score: 0.0
    player_stat: 0.0
    penalty_or_red: 0.0
    penalty_awarded: 0.0
    btts_and_total: 0.0
    win_to_nil: 0.0
    clean_sheet: 0.0
    goes_to_extra_time: 0.0
    goes_to_shootout: 0.0
    total_goals_parity: 0.0

# Referee discipline model. Multipliers on card/foul/penalty rates per referee, built from
# an aggregated history table (`sportspredict referee-history` writes history_csv from the
# API-Football competitions below) and shrunk toward 1.0 for small samples
# (ingest/referee.py). compete loads history_csv automatically when it exists.
referee:
  shrink_matches: 10                     # EB prior strength, in match-equivalents
  history_csv: data/processed/referee_history.csv
  history_league_seasons:                # API-Football (league_id, season) pairs to scan
    - [1, 2022]                          # FIFA World Cup 2022
    - [4, 2024]                          # UEFA Euro 2024
    - [9, 2024]                          # Copa America 2024

# Cross-match tournament dynamics (see sportspredict.tournament). A few high-impact, simple
# effects: live Elo updates, one-match suspensions, key-player availability, and fatigue.
tournament:
  host_teams: ["United States", "Canada", "Mexico"]
  group_stage_end: "2026-06-28"          # fixtures at/after this date are knockout
  suspend_yellow_threshold: 2            # yellows accumulated -> next-match ban
  key_player_goal_rate: 0.45             # >= this np-goals/90 counts as a key player
  key_player_elo_penalty: 35             # Elo hit when a key player is unavailable
  extra_time_fatigue_elo: 20             # transient Elo hit after playing extra time
  short_rest_days: 3                     # <= this many days between matches => fatigue
  short_rest_elo: 15
  elo_k: 30                              # Elo update sensitivity
  elo_home_adv: 65

# Data-source credentials are read from environment variables, not stored here:
#   APIFOOTBALL_KEY, ODDS_API_KEY, SPORTSPREDICT_KEY
data_sources:
  statsbomb_competitions:        # (competition_id, season_id) men's modern tournaments
    - [43, 106]                  # FIFA World Cup 2022
    - [43, 3]                    # FIFA World Cup 2018
    - [55, 282]                  # UEFA Euro 2024
    - [55, 43]                   # UEFA Euro 2020
    - [1267, 107]                # AFCON 2023
    - [223, 282]                 # Copa America 2024
  cache_dir: data/raw
  # `sphybrid ingest` scales the learned-rate table with API-Football senior men's INTERNATIONAL
  # matches (no model change — just more rows in the same schema). Seasons >= min_year are discovered
  # per league; clubs/youth/women are dropped by the elo.csv national-team whitelist. League ids:
  apifootball_min_year: 2018
  apifootball_leagues:
    - 1                          # World Cup
    - 4                          # Euro Championship
    - 5                          # UEFA Nations League
    - 6                          # Africa Cup of Nations
    - 7                          # Asian Cup
    - 9                          # Copa America
    - 10                         # Friendlies (international)
    - 21                         # Confederations Cup
    - 22                         # CONCACAF Gold Cup
    - 29                         # World Cup Qualification — Africa
    - 30                         # World Cup Qualification — Asia
    - 31                         # World Cup Qualification — CONCACAF
    - 32                         # World Cup Qualification — Europe
    - 33                         # World Cup Qualification — Oceania
    - 34                         # World Cup Qualification — South America
    - 37                         # World Cup Qualification — Intercontinental Play-offs
    - 35                         # Asian Cup Qualification
    - 36                         # Africa Cup of Nations Qualification
    - 536                        # CONCACAF Nations League
    - 913                        # CONMEBOL-UEFA Finalissima
    - 960                        # Euro Qualification
